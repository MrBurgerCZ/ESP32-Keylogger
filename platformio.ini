; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = board_host, board_device

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

[env:board_host]
build_src_filter = +<host/> -<device/>
upload_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_AC:A7:04:2C:59:84-if00
monitor_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_AC:A7:04:2C:59:84-if00
build_flags = -D ROLE_HOST

[env:board_device]
build_src_filter = -<host/> +<device/>
; lib_deps = https://github.com/esp32beans/ESP32_USB_Host_HID.git
upload_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_AC:A7:04:2C:5E:00-if00
monitor_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_AC:A7:04:2C:5E:00-if00
build_flags = -D ROLE_DEVICE